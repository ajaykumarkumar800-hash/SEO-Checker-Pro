<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Checker Pro — Welcome</title>
    <meta name="description" content="SEO Checker Pro — Enterprise-Level SEO Analysis Tool. Analyze any website for 130+ SEO checks across 10 categories.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .launch-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        .launch-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            box-shadow: 0 20px 60px rgba(79, 70, 229, 0.3);
        }
        .launch-logo svg { width: 40px; height: 40px; color: white; }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .launch-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            padding: 16px 40px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.35);
        }
        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(79, 70, 229, 0.5);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 48px;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px 16px;
            transition: all 0.2s ease;
        }
        .feature-card:hover { background: rgba(255, 255, 255, 0.08); }
        .feature-num { font-size: 1.6rem; font-weight: 800; color: #7c3aed; margin-bottom: 6px; }
        .feature-label { font-size: 0.78rem; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link" style="position:absolute; top:-40px; left:0; background:#000; color:#fff; padding:8px; z-index:100; transition: top 0.2s;" onfocus="this.style.top='0px'" onblur="this.style.top='-40px'">Skip to main content</a>
    <div id="main-content" class="launch-container">
        <div class="launch-logo">
            <svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="3">
                <circle cx="18" cy="18" r="16"/>
                <path d="M11 19L15.5 23.5L25 12.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>SEO Checker Pro</h1>
        <p class="subtitle">Enterprise-level website SEO analysis engine. 130+ real-time checks across 10 categories with actionable recommendations.</p>
        <a href="/scanner" class="launch-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            Launch Scanner
        </a>
        <div class="features">
            <div class="feature-card">
                <div class="feature-num">130+</div>
                <div class="feature-label">SEO Checks</div>
            </div>
            <div class="feature-card">
                <div class="feature-num">10</div>
                <div class="feature-label">Categories</div>
            </div>
            <div class="feature-card">
                <div class="feature-num">100%</div>
                <div class="feature-label">Real-Time</div>
            </div>
        </div>
    </div>
</body>
</html>
